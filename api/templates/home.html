function decodeHtml(html) {
    var txt = document.createElement("textarea");
    txt.innerHTML = html;
    return txt.value;
} 

function getLuckyGuy(){
    $('#getLuckyGuy').hide();
	$('#result_name').html('') 
	$('.odometer').html(99999999);
    
    awardid = $('#awardCurrentId').val()
    $.ajax({
		url: ajaxUrlPort+"getLuckyGuy",
	    	//url: "https://game2-black.vercel.app/getLuckyGuy",
		type: "GET",
		dataType: 'json',
		data:{awardid:awardid},
        contentType: "application/json; charset=utf-8",
		success: function (data) {
			console.log('getLuckyGuy:')
			console.log(data)
            member_award = data['member_award']
            for(i = 0 ; i < Object.keys(member_award).length ; i++){
                PERNR = member_award[i]['PERNR']
                name = member_award[i]['name']
                department = member_award[i]['department']
            }
            quantity = $('#quantity').html()
            remaining_count=$('#remaining_count').val()
            remaining_count = remaining_count-Object.keys(member_award).length
            
            
            //alert('remaining_count1:'+remaining_count1+ ',quantity:'+quantity+',remaining_count:'+remaining_count+' '+(quantity - $('#remaining_count').val()-1))
            $('#remaining_count').val(remaining_count)
             
            if(remaining_count > 0){
                remaining_string = '，還有'+remaining_count+'個機會!'
            }else{
                remaining_string = '，已全數抽完 !';
            }
            $('#remaining').html(remaining_string)
            
            setTimeout(function(){ 
                //alert(result)
                //$('.odometer').html(18017220);
                $('.odometer').html(PERNR); 
                setTimeout(function() {                    
                    if(award_status == 1){
                    $('#result_name').html('恭喜 <span style="color:#98FB98;">'+department+'</span> <span style="color:orange;">'+name+'</span> 獲獎 !!')
                    }else if(award_status == 2){
                        $('#result_name').html('恭喜獲獎 !!')
                    }
                    $('.w3-agilefireworks').fireworks();
                    add_already_got_member(member_award)
                    if(remaining_count == 0){
                        $('#odometer').hide();
                        //$('#getLuckyGuy').hide();
                    }else{

                        $('#getLuckyGuy').show();
                    }
                    //setTimeout(function() { 
                         //fireworks_stop() 
                         //$('.w3-agilefireworks').fireworks().destroy()
                    //}, 3000);	
                }, 2500);
               
              }, 100);
		},				
		error: function(xhr) {
		  alert('getLuckyGuy 發生錯誤:'+JSON.stringify(xhr)); 
		}
	});     
}



function add_already_got_member(new_member){
    html = $('#alreadyGotMember').html()
    count = (html.match(/add_already_got_member/g) || []).length; 
    if(Object.keys(new_member).length > 0){
        for(i = 0 ; i < Object.keys(new_member).length ; i++){
            PERNR = new_member[i]['PERNR']
            name  = new_member[i]['name']
            department  = new_member[i]['department'] 
            no = i+1+count
            if(no > 1 && (no-1)%5 == 0) {
                html=html+'<br><br>'
            }
            html=html+'<div class="btn-group" role="group" aria-label="add_already_got_member">'+
            '<button  class="btn btn-light btn-lg" style="pointer-events:;position: relative;z-index: 1289;" onclick="deleteLuckyGuy(\''+PERNR+'\',\''+name+'\')">'+no+'</button>'+
            '<button  class="btn btn-primary active btn-lg" style="pointer-events: none;" >'+department+'</button>'+
            '<button type="button" class="btn btn-light btn-lg" style="pointer-events: none;" >'+name+'</button></div>&nbsp;&nbsp;&nbsp;'                
        }                
    }
    $('#alreadyGotMember').html(html)
}

function downloadExcel(){  
	var workbook = ExcelBuilder.Builder.createWorkbook();
	var worksheet = workbook.createWorksheet({ name: 'result' });
	var stylesheet = workbook.getStyleSheet(); 
	var originalData = JSON.parse(decodeHtml("{{data['awardResult']}}").replace(/'/g, '"'))
	var albumTable = new ExcelBuilder.Table(); 
	albumTable.setReferenceRange([1, 1, 1, 1, 1, 1], [7, originalData.length]);
	albumTable.setTableColumns(['獎項', '獎品', '總數量','姓名', '工號','單位','時間']);

	worksheet.sheetView.showGridLines = false;
	worksheet.setData(originalData);
	workbook.addWorksheet(worksheet);
	worksheet.addTable(albumTable);
	workbook.addTable(albumTable);
	ExcelBuilder.Builder.createFile(workbook).then(function (data) {
		if('download' in document.createElement('a')){ 
			$("#downloader").attr({
				href: "data:application/vnd.openxmlformats-officedocument.spreadsheetml.sheet;base64,"+ data
			});
		} else { 
			Downloadify.create('downloader',{
				filename: function(){
					return "result.xlsx";
				},
				data: function(){
					return data;
				}, 
				//swf: 'downloadify/media/downloadify.swf',
				//downloadImage: 'downloadify/images/download.png',
				width: 100,
				dataType: 'base64',
				height: 30,
				transparent: true,
				append: false
			});
		}
	}); 
}
